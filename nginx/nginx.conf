worker_processes auto;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  gzip on;
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  upstream api { server pranitra_api:4000; }
  upstream frontend { server pranitra_frontend:3000; }
  server {
    listen 80;
    server_name erp.pranitra.com;
    return 301 https://$host$request_uri;
  }
  server {
    listen 443 ssl;
    server_name erp.pranitra.com;
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    client_max_body_size 50M;
    location ~ ^/api/auth/ { limit_req zone=auth burst=5 nodelay; proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/ { limit_req zone=api burst=20 nodelay; proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /uploads/ { proxy_pass http://api/uploads/; }
    location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection upgrade; }
  }
}
